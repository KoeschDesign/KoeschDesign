<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kösch Design — Rapport hebdomadaire</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--rouge:#CC0000;--rouge-dark:#990000;--dark:#1A1A1A;--zinc:#4A4A4A;--zinc-light:#888;--silver:#CCC;--frost:#F5F5F5;--white:#FFF;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Inter,sans-serif;background:#EEE;color:var(--dark);}

.toolbar{background:var(--dark);border-bottom:3px solid var(--rouge);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;}
.lang-switch{display:flex;gap:0;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;overflow:hidden;}
.lang-btn{background:transparent;color:#bbb;border:none;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;}
.lang-btn.active{background:var(--rouge);color:white;}
.toolbar-logo img{height:28px;display:block;}
.toolbar-actions{display:flex;gap:6px;flex-wrap:wrap;}
.btn{padding:9px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:Inter,sans-serif;}
.btn-rouge{background:var(--rouge);color:white;font-weight:700;}
.btn-ghost{background:rgba(255,255,255,.12);color:white;}

.page{max-width:760px;margin:14px auto;padding:0 12px 60px;}

.report-header{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--rouge);padding:16px 6px;margin-bottom:16px;}
.report-logo{height:42px;}
.report-title{text-align:right;}
.report-title h1{font-size:17px;font-weight:800;}
.report-title p{font-size:10px;color:var(--zinc-light);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

.info-card{background:white;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.info-card .fg{margin-bottom:12px;}
.info-card .fg:last-child{margin-bottom:0;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--zinc-light);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.fg input,.fg textarea,.fg select{width:100%;padding:13px 14px;border:1.5px solid var(--silver);border-radius:10px;font-size:16px;font-family:Inter,sans-serif;outline:none;color:var(--dark);background:white;}
.fg input:focus,.fg textarea:focus{border-color:var(--rouge);}
.fg textarea{resize:vertical;min-height:54px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.day-toggles-card{background:white;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.day-toggles-card .tlabel{font-size:11px;font-weight:700;color:var(--zinc-light);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
#day-toggles{display:flex;gap:6px;flex-wrap:wrap;}
.day-toggle{padding:8px 13px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;transition:all .15s;}

.day-card{background:white;border-radius:12px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;}

.day-card-header{background:var(--dark);color:white;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
.day-card-header .dname{font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.day-card-header input[type=date]{border:none;background:rgba(255,255,255,.18);color:white;border-radius:6px;padding:5px 9px;font-size:13px;font-family:Inter,sans-serif;outline:none;color-scheme:dark;}
.day-card-header .dtotal{font-size:14px;color:#fff;font-weight:700;white-space:nowrap;}

.chantier-block{border-bottom:1px solid #f0f0f0;padding:16px;position:relative;}
.chantier-block:last-of-type{border-bottom:none;}
.chantier-num{font-size:11px;font-weight:800;color:var(--rouge);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.entry-del{position:absolute;top:12px;right:12px;background:#f5f5f5;border:none;border-radius:6px;color:#bbb;font-size:14px;cursor:pointer;width:28px;height:28px;}
.entry-del:active{background:#ffe5e5;color:var(--rouge);}
.entry-fields{display:flex;flex-direction:column;gap:12px;}
.cc-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.slots{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.slot{background:#f8f8f8;border:1px solid #eee;border-radius:10px;padding:11px;}
.slot-label{font-size:11px;font-weight:800;color:var(--dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.time-row-2{display:flex;gap:8px;align-items:end;flex-wrap:wrap;}
.time-row-2 .fg-mini{flex:1;min-width:90px;}
@media(max-width:640px){
  .slots{grid-template-columns:1fr;}
}
.entry-fields .fg-mini label{display:block;font-size:10px;font-weight:700;color:var(--zinc-light);letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.entry-fields input,.entry-fields textarea{width:100%;padding:12px 13px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:16px;font-family:Inter,sans-serif;outline:none;color:var(--dark);background:#fafafa;}
.entry-fields input:focus,.entry-fields textarea:focus{border-color:var(--rouge);background:white;}
.entry-fields textarea{resize:vertical;min-height:48px;}
.time-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;}
.time-select-group{display:flex;align-items:center;gap:3px;}
.time-select-group select{width:auto;flex:1;padding:12px 4px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:16px;font-family:Inter,sans-serif;outline:none;color:var(--dark);background:#fafafa;text-align:center;}
.time-select-group select:focus{border-color:var(--rouge);background:white;}
.time-colon{font-weight:700;color:#999;}
.time-result{background:var(--rouge);color:white;border-radius:9px;padding:12px 10px;font-size:15px;font-weight:800;text-align:center;min-width:64px;align-self:end;}

.absent-btn{background:white;border:1.5px solid rgba(255,255,255,.4);color:white;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;background:rgba(255,255,255,.1);}
.absent-btn.active{background:var(--rouge);border-color:var(--rouge);}
.status-select{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.4);color:white;border-radius:6px;padding:5px 26px 5px 9px;font-size:12px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;-webkit-appearance:none;appearance:none;}
.status-select option{color:#222;}
.status-select.absent{background:var(--rouge);border-color:var(--rouge);}
.absent-panel{padding:14px 16px;background:#fff5f5;border-bottom:1px solid #f0d0d0;}
.add-entry{padding:12px 16px;}
.add-entry button{width:100%;background:#fff5f5;border:1.5px dashed var(--rouge);border-radius:10px;color:var(--rouge);font-size:14px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;padding:13px;}

.frais-card{background:white;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border-left:5px solid var(--rouge);}
.frais-card-title{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--rouge);margin-bottom:14px;}
.frais-card-label{font-size:11px;font-weight:700;color:var(--zinc-light);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.repas-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.repas-toggle{padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;border:1.5px solid #ddd;background:white;color:#999;transition:all .15s;}
.repas-toggle.on{border-color:var(--rouge);background:var(--rouge);color:white;}
.repas-toggle.disabled{opacity:.4;background:#f0f0f0;color:#bbb;border-color:#e0e0e0;cursor:not-allowed;text-decoration:line-through;}
.frais-inputs{display:flex;flex-direction:column;gap:12px;}
.week-total-card{background:var(--dark);border-radius:12px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border-left:5px solid var(--rouge);}
.week-total-card .wtlabel{font-size:13px;font-weight:700;color:#ccc;letter-spacing:.5px;text-transform:uppercase;}
.week-total-card .wtvalue{font-size:28px;font-weight:800;color:white;}

.sig-card{background:white;border-radius:12px;padding:20px 16px;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.sig-field{text-align:center;}
.sig-line{border-top:1.5px solid #999;margin-bottom:6px;padding-top:46px;}
.sig-label{font-size:11px;color:var(--zinc-light);font-weight:600;}

.footer-sig{text-align:center;font-size:12px;color:#aaa;font-weight:600;margin-top:24px;}

@media print{
  body{background:white;font-size:8px;}
  .toolbar,.day-toggles-card,.entry-del,.add-entry,.absent-btn{display:none !important;}
  .page{margin:0;max-width:100%;padding:0;}
  .report-header{padding:1px 4px;margin-bottom:3px;border-bottom-width:1.5px;}
  .report-logo{height:22px;}
  .info-card{box-shadow:none;border:none;padding:0 0 3px;margin-bottom:3px;border-bottom:1px solid #ddd;border-radius:0;}
  .info-card .fg{margin-bottom:0;}
  .fg label{font-size:6.5px;margin-bottom:0;color:#888;}
  .info-card input{padding:0;font-size:10px;border:none;font-weight:700;}
  /* One day per compact horizontal band */
  #days-container{display:block !important;}
  .day-card{display:flex !important;align-items:stretch;width:100% !important;box-shadow:none;border:1px solid #999;margin-bottom:3px;break-inside:avoid;border-radius:3px;overflow:hidden;}
  /* Day name becomes a vertical label on the left */
  .day-card-header{flex:0 0 70px;flex-direction:column;justify-content:center;align-items:flex-start;padding:3px 6px;gap:2px;}
  .day-card-header .dname{font-size:8.5px;flex-direction:column;align-items:flex-start;gap:1px;}
  .day-card-header input[type=date]{padding:0 2px;font-size:6.5px;background:rgba(255,255,255,.2);width:62px;}
  .day-card-header .dtotal{font-size:8px;}
  /* Chantiers fill the rest, side by side */
  #days-container [id^=day-body-]{display:flex !important;flex-wrap:nowrap;gap:0;flex:1;}
  .chantier-block{padding:3px 5px;border-bottom:none;border-right:1px solid #eee;flex:1;min-width:0;}
  .entry-fields{gap:2px;}
  .cc-row{gap:3px;grid-template-columns:1fr 1fr;}
  .slots{gap:3px;grid-template-columns:1fr 1fr;}
  .slot{padding:2px 3px;border-radius:2px;background:#f7f7f7;border:1px solid #e5e5e5;}
  .slot-label{font-size:6px;margin-bottom:1px;}
  .entry-fields input,.entry-fields textarea{background:white;border:1px solid #ccc;padding:2px 3px;font-size:7.5px;min-height:auto;}
  .entry-fields textarea{min-height:12px;}
  .fg-mini label{font-size:6px;margin-bottom:0;}
  .time-row-2{gap:2px;}
  .time-select-group select{padding:1px;font-size:7.5px;border:1px solid #ccc;}
  .time-colon{font-size:6px;}
  .time-result{padding:1px;font-size:7.5px;min-width:24px;}
  .absent-panel{padding:3px 5px;background:#fff5f5;flex:1;}
  .week-total-card{box-shadow:none;padding:4px 12px;margin-bottom:0;margin-top:4px;border-radius:3px;}
  .week-total-card .wtlabel{font-size:9px;}
  .week-total-card .wtvalue{font-size:15px;}
  .footer-sig{display:none !important;}
  @page{size:A4 landscape;margin:6mm;}
}
</style>
</head>

function t(k){return I18N[LANG][k]!==undefined?I18N[LANG][k]:k;}
function dname(j){return I18N[LANG].days[j]||j;}
function dshort(j){return I18N[LANG].daysShort[j]||j.slice(0,3);}
function captureState(){
  const st={dates:{},absent:{},absentType:{},absentAutre:{},days:{}};
  st.nom=(document.getElementById("nom")||{}).value||"";
  st.prenom=(document.getElementById("prenom")||{}).value||"";
  st.autreFrais=(document.getElementById("autre-frais")||{}).value||"";
  st.plaque=(document.getElementById("plaque")||{}).value||"";
  st.repas={...repasState};
  st.activeDays=[...JOURS];
  st.lang=LANG;
  JOURS.forEach((j,di)=>{
    const dd=document.getElementById("day-date-"+di); if(dd)st.dates[di]=dd.value;
    st.absent[di]=!!absentDays[di];
    const at=document.getElementById("status-"+di); if(at)st.absentType[di]=at.value;
    const aa=document.getElementById("absent-autre-"+di); if(aa)st.absentAutre[di]=aa.value;
    const tb=document.getElementById("day-body-"+di);
    if(tb){
      st.days[di]=[...tb.querySelectorAll(".chantier-block")].map(b=>{
        const inp=b.querySelectorAll("input[type=text]");
        const ta=b.querySelectorAll("textarea");
        const slots=[...b.querySelectorAll(".slot")].map(sl=>({
          sh:sl.querySelector(".t-start-h").value, sm:sl.querySelector(".t-start-m").value,
          eh:sl.querySelector(".t-end-h").value, em:sl.querySelector(".t-end-m").value
        }));
        return {client:inp[0].value,chantier:inp[1].value,desc:ta[0].value,rem:ta[1].value,slots};
      });
    }
  });
  return st;
}
function restoreState(st){
  if(st.nom!==undefined){const e=document.getElementById("nom");if(e)e.value=st.nom;}
  if(st.prenom!==undefined){const e=document.getElementById("prenom");if(e)e.value=st.prenom;}
  if(st.autreFrais!==undefined){const e=document.getElementById("autre-frais");if(e)e.value=st.autreFrais;}
  if(st.plaque!==undefined){const e=document.getElementById("plaque");if(e)e.value=st.plaque;}
  if(st.repas){repasState={...st.repas};}
  JOURS.forEach((j,di)=>{
    if(st.dates[di]!==undefined){const dd=document.getElementById("day-date-"+di);if(dd)dd.value=st.dates[di];}
    // restore chantier blocks
    const data=st.days[di]||[];
    const tb=document.getElementById("day-body-"+di);
    if(tb&&data.length){
      tb.innerHTML="";
      data.forEach(()=>addChantier(di));
      const blocks=tb.querySelectorAll(".chantier-block");
      data.forEach((d,bi)=>{
        const b=blocks[bi]; if(!b)return;
        const inp=b.querySelectorAll("input[type=text]");
        const ta=b.querySelectorAll("textarea");
        inp[0].value=d.client; inp[1].value=d.chantier;
        ta[0].value=d.desc; ta[1].value=d.rem;
        const slots=b.querySelectorAll(".slot");
        d.slots.forEach((s,si)=>{
          if(!slots[si])return;
          slots[si].querySelector(".t-start-h").value=s.sh; slots[si].querySelector(".t-start-m").value=s.sm;
          slots[si].querySelector(".t-end-h").value=s.eh; slots[si].querySelector(".t-end-m").value=s.em;
        });
      });
    }
    if(st.absent[di]){
      const at=document.getElementById("status-"+di); if(at&&st.absentType[di])at.value=st.absentType[di];
      const aa=document.getElementById("absent-autre-"+di); if(aa&&st.absentAutre[di])aa.value=st.absentAutre[di];
      onStatusChange(di);
    } else {
      const at=document.getElementById("status-"+di); if(at)at.value="__work__";
    }
    calc(di);
  });
  renderRepasToggles();
  calcWeek();
}
function setLang(l){
  LANG=l;
  document.getElementById("lang-fr").classList.toggle("active",l==="fr");
  document.getElementById("lang-de").classList.toggle("active",l==="de");
  document.documentElement.lang=l;
  document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.getAttribute("data-i18n"));});
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{el.placeholder=t(el.getAttribute("data-i18n-ph"));});
  const st=captureState();
  renderDayToggles();
  buildSheet();
  restoreState(st);
}

let repasState={};
function renderDayToggles(){
  document.getElementById("day-toggles").innerHTML=JOURS_ALL.map(j=>{
    const a=JOURS.includes(j);
    return `<button class="day-toggle" onclick="toggleDay('${j}')" style="border:1.5px solid ${a?'var(--rouge)':'#ddd'};background:${a?'var(--rouge)':'white'};color:${a?'white':'#999'};">${a?'✓ ':''}${dshort(j)}</button>`;
  }).join("");
  renderRepasToggles();
}
function renderRepasToggles(){
  const el=document.getElementById("repas-toggles");
  if(!el)return;
  el.innerHTML=JOURS.map((j,di)=>{
    const absent=!!absentDays[di];
    const on=repasState[j]&&!absent;
    const cls="repas-toggle "+(on?"on":"")+(absent?" disabled":"");
    const click=absent?"":`onclick="toggleRepas('${j}')"`;
    return `<button class="${cls}" ${click}>${on?'✓ ':''}${dname(j)}</button>`;
  }).join("");
}
function toggleRepas(j){
  const di=JOURS.indexOf(j);
  if(absentDays[di])return; // can't take a meal on an absent day
  repasState[j]=!repasState[j];
  renderRepasToggles();
}
function toggleDay(j){
  if(JOURS.includes(j)){
    if(JOURS.length<=1){alert("Au moins un jour");return;}
    JOURS=JOURS.filter(x=>x!==j);
  } else {
    JOURS=JOURS_ALL.filter(x=>JOURS.includes(x)||x===j);
  }
  renderDayToggles();buildSheet();
}

function buildSheet(){
  document.getElementById("days-container").innerHTML=JOURS.map((j,di)=>`
    <div class="day-card">
      <div class="day-card-header">
        <span class="dname">${dname(j)}<input type="date" id="day-date-${di}" onchange="autoFillDates(${di})"></span>
        <span style="display:flex;align-items:center;gap:10px;">
          <select class="status-select" id="status-${di}" onchange="onStatusChange(${di})">
            <option value="__work__">${t('worked')}</option>
            <option value="Vacances">${t('vacances')}</option>
            <option value="Férié">${t('ferie')}</option>
            <option value="__autre__">${t('autre')}</option>
          </select>
          <span class="dtotal" id="day-total-${di}">0h00</span>
        </span>
      </div>
      <div class="absent-panel" id="absent-panel-${di}" style="display:none;">
        <div class="fg-mini" id="absent-autre-fg-${di}" style="display:none;">
          <label>${t('precisez')}</label>
          <input type="text" id="absent-autre-${di}" placeholder="${t('motifPh')}">
        </div>
      </div>

let absentDays={};
function onStatusChange(di){
  const sel=document.getElementById("status-"+di);
  const v=sel.value;
  const panel=document.getElementById("absent-panel-"+di);
  const body=document.getElementById("day-body-"+di);
  const addEntry=document.getElementById("add-entry-"+di);
  const autreFg=document.getElementById("absent-autre-fg-"+di);
  if(v==="__work__"){
    // Normal working day
    absentDays[di]=false;
    panel.style.display="none";
    autreFg.style.display="none";
    body.style.display="";
    addEntry.style.display="";
    sel.classList.remove("absent");
    calc(di);
  } else {
    // Absent: uncheck this day's meal
    const dayName=JOURS[di];
    if(dayName)repasState[dayName]=false;
    // Absence of some kind (Férié, Vacances, etc.)
    absentDays[di]=true;
    body.style.display="none";
    addEntry.style.display="none";
    sel.classList.add("absent");
    // Show free-text box only for "Autre"
    if(v==="__autre__"){
      panel.style.display="block";
      autreFg.style.display="block";
    } else {
      panel.style.display="none";
      autreFg.style.display="none";

}
function getAbsentMotif(di){
  let v=document.getElementById("status-"+di).value;

}
function addChantier(di){

function hourOptions(sel){
  let o=`<option value="">--</option>`;
  for(let h=0;h<=23;h++){const hh=String(h).padStart(2,"0");o+=`<option value="${hh}"${sel===hh?" selected":""}>${hh}</option>`;}
  return o;
}
function minOptions(sel){
  let o=`<option value="">--</option>`;
  ["00","15","30","45"].forEach(m=>{o+=`<option value="${m}"${sel===m?" selected":""}>${m}</option>`;});
  return o;
}
function getTime(entry,which){
  const h=entry.querySelector(`.t-${which}-h`).value;
  const m=entry.querySelector(`.t-${which}-m`).value;
  if(h===""||m==="")return"";
  return h+":"+m;
}
function calc(di){
  const tb=document.getElementById("day-body-"+di);
  let dayMin=0;
  tb.querySelectorAll(".slot").forEach(e=>{
    const s=getTime(e,"start"),en=getTime(e,"end");
    const cell=e.querySelector(".cell-hours");
    if(s&&en){
      const [sh,sm]=s.split(":").map(Number),[eh,em]=en.split(":").map(Number);
      let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;
      dayMin+=mins;cell.textContent=fmtH(mins);
    } else cell.textContent="—";
  });
  document.getElementById("day-total-"+di).textContent=fmtH(dayMin);
  calcWeek();
}
function calcWeek(){
  let total=0;
  JOURS.forEach((_,di)=>{
    document.getElementById("day-body-"+di).querySelectorAll(".slot").forEach(e=>{
      const s=getTime(e,"start"),en=getTime(e,"end");
      if(s&&en){const [sh,sm]=s.split(":").map(Number),[eh,em]=en.split(":").map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;total+=mins;}
    });
  });
  document.getElementById("week-total").textContent=fmtH(total);
}
function fmtH(mins){const h=Math.floor(mins/60),m=mins%60;return h+"h"+String(m).padStart(2,"0");}

function autoFillDates(di){
  const val=document.getElementById("day-date-"+di).value;
  if(!val)return;
  const [y,m,d]=val.split("-").map(Number);
  const base=new Date(y,m-1,d,12,0,0);
  const editedIdx=JOURS_ALL.indexOf(JOURS[di]);
  for(let i=0;i<JOURS.length;i++){
    if(i===di)continue;
    const thisIdx=JOURS_ALL.indexOf(JOURS[i]);
    const nd=new Date(base);nd.setDate(nd.getDate()+(thisIdx-editedIdx));
    const ds=nd.getFullYear()+"-"+String(nd.getMonth()+1).padStart(2,"0")+"-"+String(nd.getDate()).padStart(2,"0");
    const inp=document.getElementById("day-date-"+i);if(inp)inp.value=ds;
  }
}
function weekNumFromDate(date){
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  return Math.ceil((((d-new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000)+1)/7);
}
function getWeekYearFromDates(){
  // Find first filled day date
  for(let i=0;i<JOURS.length;i++){
    const v=document.getElementById("day-date-"+i);
    if(v&&v.value){
      const [y,m,d]=v.value.split("-").map(Number);
      const dt=new Date(y,m-1,d,12,0,0);
      return {semaine:weekNumFromDate(dt),annee:dt.getFullYear()};
    }
  }
  return {semaine:"",annee:""};
}

function fmtDateFr(s){const [y,m,d]=s.split("-");return `${parseInt(d)} ${I18N[LANG].months[parseInt(m)-1]} ${y}`;}

function sendByEmail(){
  const nom=document.getElementById("nom").value.trim();
  const prenom=document.getElementById("prenom").value.trim();
  const monteur=(nom+" "+prenom).trim();
  if(!monteur){alert("Merci d'indiquer le nom et prénom");return;}
  let body=`${t("reportTitle")}\n${t("namePrefix")} : ${monteur}\n${"=".repeat(36)}\n\n`;
  JOURS.forEach((j,di)=>{
    const tb=document.getElementById("day-body-"+di);
    const dateVal=document.getElementById("day-date-"+di).value;
    const dayTitle=`${dname(j)}${dateVal?" "+fmtDateFr(dateVal):""}`;
    // Absent day
    if(absentDays[di]){
      body+=`${"-".repeat(36)}\n${dayTitle.toUpperCase()}\n  ${t("absent").toUpperCase()} — ${getAbsentMotif(di)}\n\n`;
      return;
    }
    const blocks=[...tb.querySelectorAll(".chantier-block")].filter(b=>{
      const inp=b.querySelectorAll("input[type=text]");
      const hasTime=[...b.querySelectorAll(".slot")].some(s=>getTime(s,"start"));
      return inp[0].value.trim()||inp[1].value.trim()||hasTime;
    });
    if(!blocks.length)return;
    body+=`${"-".repeat(36)}\n${dayTitle.toUpperCase()}\n`;
    let dayMin=0;
    blocks.forEach((b,bi)=>{
      const inp=b.querySelectorAll("input[type=text]");
      const ta=b.querySelectorAll("textarea");
      const client=inp[0].value.trim()||"—",chantier=inp[1].value.trim()||"—";
      const desc=ta[0].value.trim(),rem=ta[1].value.trim();
      body+=`\n  ${t("client")} : ${client}\n`;
      body+=`  ${t("chantier")} : ${chantier}\n`;
      b.querySelectorAll(".slot").forEach(sl=>{
        const lbl=sl.querySelector(".slot-label").textContent;
        const s=getTime(sl,"start"),en=getTime(sl,"end");
        if(s&&en){const [sh,sm]=s.split(":").map(Number),[eh,em]=en.split(":").map(Number);let mins=(eh*60+em)-(sh*60+sm);if(mins<0)mins+=1440;dayMin+=mins;body+=`  ${lbl.padEnd(10," ")}: ${s} - ${en}  (${fmtH(mins)})\n`;}
      });
      if(desc)body+=`  Travail   : ${desc}\n`;
      if(rem)body+=`  ${t("remarque")} : ${rem}\n`;
    });
    body+=`\n  >>> ${t("dayTotal")} : ${fmtH(dayMin)}\n\n`;
  });
  body+=`${"=".repeat(36)}\n${t("weekTotal").toUpperCase()} : ${document.getElementById("week-total").textContent}\n`;
  // Frais
  const repasL=JOURS.filter(j=>repasState[j]);
  const af=(document.getElementById("autre-frais")||{}).value||"";
  const pl=(document.getElementById("plaque")||{}).value||"";
  body+=`\n${"-".repeat(36)}\n${t("expenses").toUpperCase()}\n`;
  body+=`  ${t("meals")} : ${repasL.length?repasL.map(dname).join(", "):t("none")}\n`;
  if(af)body+=`  ${t("otherExpense")} : ${af}\n`;
  if(pl)body+=`  ${t("plate")} : ${pl}\n`;
  const subject=`${t("subject")} — ${monteur}`;
  window.location.href=`mailto:${EMAIL_DIRECTION}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function resetSheet(){
  if(!confirm(t("clearConfirm")))return;
  try{localStorage.removeItem("kosch_rapport_autosave");}catch(e){}
  location.reload();
}
// ===== AUTOSAVE (local, par téléphone) =====
const SAVE_KEY="kosch_rapport_autosave";
let saveTimer=null;
function autoSave(){
  try{
    const st=captureState();
    localStorage.setItem(SAVE_KEY,JSON.stringify(st));
  }catch(e){}
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(autoSave,400);
}
function autoLoad(){
  let st=null;
  try{st=JSON.parse(localStorage.getItem(SAVE_KEY)||"null");}catch(e){}
  if(!st)return;
  // restore active days + language first
  if(st.lang&&st.lang!==LANG){setLang(st.lang);}
  if(st.activeDays&&st.activeDays.length){JOURS=JOURS_ALL.filter(d=>st.activeDays.includes(d));}
  renderDayToggles();
  buildSheet();
  restoreState(st);
}
function clearAutoSave(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
}
// Save on any input/change anywhere in the form
document.addEventListener("input",scheduleSave,true);
document.addEventListener("change",scheduleSave,true);

renderDayToggles();
buildSheet();
autoLoad();
</script>
