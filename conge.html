<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kösch Design — Demande de congé</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--rouge:#CC0000;--rouge-dark:#990000;--dark:#1A1A1A;--zinc:#4A4A4A;--zinc-light:#888;--silver:#CCC;--frost:#F5F5F5;--white:#FFF;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,sans-serif;background:#EEE;color:var(--dark);min-height:100vh;}

/* Header with smoke */
.top{background:#0a0a0a;position:relative;overflow:hidden;padding:36px 20px 30px;text-align:center;border-bottom:4px solid var(--rouge);}
.lang-switch{position:absolute;top:14px;right:14px;display:flex;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;overflow:hidden;z-index:10;}
.lang-btn{background:transparent;color:#bbb;border:none;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.lang-btn.active{background:var(--rouge);color:#fff;}
.smoke-c{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.sm{position:absolute;bottom:-150px;border-radius:50%;filter:blur(45px);animation:up 8s ease-in-out infinite;}
.sm1{left:10%;width:300px;height:300px;background:radial-gradient(ellipse at center,rgba(204,0,0,.5) 0%,transparent 70%);}
.sm2{left:40%;width:260px;height:260px;background:radial-gradient(ellipse at center,rgba(190,0,0,.4) 0%,transparent 67%);animation-delay:2s;animation-duration:10s;}
.sm3{right:12%;width:300px;height:300px;background:radial-gradient(ellipse at center,rgba(220,0,0,.45) 0%,transparent 68%);animation-delay:4s;animation-duration:9s;}
@keyframes up{0%{transform:translateY(0) scale(1);opacity:0;}15%{opacity:1;}55%{transform:translateY(-120px) scale(1.3);opacity:.6;}100%{transform:translateY(-260px) scale(1.7);opacity:0;}}
.top img{height:46px;position:relative;z-index:2;margin-bottom:14px;}
.top h1{position:relative;z-index:2;color:white;font-size:20px;font-weight:800;letter-spacing:.3px;}
.top p{position:relative;z-index:2;color:rgba(255,255,255,.6);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-top:5px;}

.container{max-width:520px;margin:0 auto;padding:24px 16px 60px;}
.card{background:white;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:28px 26px;margin-top:-10px;position:relative;z-index:5;}

.fg{margin-bottom:18px;}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--zinc-light);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--silver);border-radius:var(--radius);font-size:15px;font-family:Inter,sans-serif;outline:none;transition:border-color .2s;color:var(--dark);background:white;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--rouge);}
.fg input[type="date"]{-webkit-appearance:none;appearance:none;min-height:48px;text-align:left;box-sizing:border-box;background:white;min-width:0;}
.fg input[type="date"]::-webkit-date-and-time-value{text-align:left;margin:0;}
.fg textarea{resize:vertical;min-height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:430px){
  .row2{gap:9px;}
  .fg input[type="date"]{padding:12px 8px;font-size:14px;}
}

.radio-group{display:flex;flex-direction:column;gap:8px;}
.radio-opt{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--silver);border-radius:var(--radius);cursor:pointer;transition:all .15s;}
.radio-opt:hover{border-color:var(--rouge);background:#fff5f5;}
.radio-opt.selected{border-color:var(--rouge);background:#fff0f0;}
.radio-opt input{width:18px;height:18px;accent-color:var(--rouge);cursor:pointer;}
.radio-opt label{font-size:14px;font-weight:600;cursor:pointer;margin:0;letter-spacing:0;text-transform:none;color:var(--dark);}

.btn-submit{width:100%;padding:15px;background:var(--rouge);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;letter-spacing:1px;text-transform:uppercase;transition:background .2s;box-shadow:0 4px 16px rgba(204,0,0,.3);margin-top:6px;}
.btn-submit:hover{background:var(--rouge-dark);}

.hidden{display:none;}
.success-card{text-align:center;padding:40px 26px;}
.success-icon{width:64px;height:64px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:32px;}
.success-card h2{font-size:20px;font-weight:800;margin-bottom:10px;}
.success-card p{color:var(--zinc-light);font-size:14px;line-height:1.6;margin-bottom:20px;}
.btn-outline{display:inline-block;padding:11px 22px;background:white;color:var(--dark);border:1.5px solid var(--silver);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;text-decoration:none;}
.btn-outline:hover{border-color:var(--rouge);color:var(--rouge);}

.info-box{background:#f0f7ff;border:1px solid #d0e4f5;border-radius:var(--radius);padding:12px 14px;font-size:12px;color:#4a6fa5;line-height:1.5;margin-bottom:18px;}

.sig{text-align:center;font-size:13px;color:#aaa;font-weight:600;margin-top:24px;}
.recap{background:var(--frost);border-radius:var(--radius);padding:14px 16px;margin:16px 0;text-align:left;font-size:13px;line-height:1.8;}
.recap b{color:var(--dark);}
.date-field{width:100%;min-height:48px;background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;text-align:left;cursor:pointer;color:var(--dark);display:flex;align-items:center;gap:8px;}
.date-field::before{content:"📅";font-size:15px;}
.date-field .date-ph{color:#aaa;}
.date-field.filled{border-color:var(--rouge);}
.cal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:1000;padding:18px;}
.cal-overlay.open{display:flex;}
.cal{background:#fff;border-radius:18px;width:100%;max-width:360px;padding:18px 16px 16px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-title{font-size:15px;font-weight:700;color:var(--dark);text-transform:capitalize;}
.cal-nav{width:38px;height:38px;border:none;background:#f2f2f2;border-radius:10px;font-size:20px;color:var(--rouge);cursor:pointer;line-height:1;}
.cal-nav:active{background:#e8e8e8;}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-dows span{text-align:center;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:1;border:none;background:transparent;border-radius:10px;font-size:14px;font-family:inherit;color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-cell.empty{visibility:hidden;}
.cal-cell:active{background:#f0f0f0;}
.cal-cell.today{font-weight:800;color:var(--rouge);}
.cal-cell.selected{background:var(--rouge);color:#fff;font-weight:700;}
.cal-cell.disabled{color:#ddd;pointer-events:none;}
.cal-close{width:100%;margin-top:14px;padding:12px;border:none;background:#f2f2f2;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;color:#555;cursor:pointer;}
</style>
</head>

<div class="container">
  <div class="card" id="form-card">

      <div class="fg">

    </div>

    <div class="row2">
      <div class="fg">
        <label data-i18n="from">Du</label>

        <input type="hidden" id="date-from">
      </div>
      <div class="fg">
        <label data-i18n="to">Au</label>

        <input type="hidden" id="date-to">

      <div class="radio-group" id="deduct-group">
        <div class="radio-opt selected" onclick="selectDeduct(this,&#39;Vacances&#39;)">
          <input type="radio" name="deduct" checked="">
          <label data-i18n="myVacation">Mes jours de vacances</label>
        </div>
        <div class="radio-opt" onclick="selectDeduct(this,&#39;Heures&#39;)">
          <input type="radio" name="deduct">
          <label data-i18n="myHours">Mes heures</label>
        </div>
        <div class="radio-opt" onclick="selectDeduct(this,&#39;Autre&#39;)">
          <input type="radio" name="deduct">
          <label data-i18n="otherBelow">Autre (préciser ci-dessous)</label>
        </div>
      </div>
    </div>

    <div class="fg hidden" id="deduct-autre-fg">
      <label data-i18n="precisez">Précisez</label>
      <input type="text" id="deduct-autre" placeholder="Ex: récupération, sans solde..." data-i18n-ph="deductAutrePh">
    </div>

    <div class="fg">
      <label data-i18n="comment">Commentaire (optionnel)</label>
      <textarea id="commentaire" placeholder="Informations complémentaires..." data-i18n-ph="commentPh"></textarea>
    </div>

    <button class="btn-submit" onclick="submitDemande()" data-i18n="submit">Envoyer ma demande</button>
  </div>

  <div class="card success-card hidden" id="success-card">
    <div class="success-icon">✓</div>
    <h2 data-i18n="sentTitle">Demande envoyée !</h2>
    <p data-i18n="sentMsg">Votre demande de congé a bien été enregistrée et transmise pour validation.</p>
    <div class="recap" id="recap"></div>
    <a class="btn-outline" id="mail-link" href="file:///C:/Users/adel2/Downloads/kosch_demande_conge_5.html#" data-i18n="alsoEmail">📧 Envoyer aussi par email</a>
    <div style="margin-top:14px;">
      <button class="btn-outline" onclick="resetForm()" data-i18n="newRequest">Nouvelle demande</button>
    </div>
  </div>

  <div class="sig">Création Adel KLjUCO</div>
</div>

<script>
// ⚙ CONFIGURATION — Adresse email de la direction
const EMAIL_DIRECTION = "timbrage@koesch-design.ch";

let LANG="fr";
const I18N={
  fr:{
    title:"Demande de congé", subtitle:"Formulaire employé",
    infobox:"Remplissez ce formulaire pour soumettre votre demande de congé. Elle sera transmise pour validation.",
    nom:"Nom", prenom:"Prénom", from:"Du", to:"Au",
    absType:"Type d'absence", vacances:"Vacances", autre:"Autre (préciser)",
    precisezType:"Précisez le type", absTypePh:"Type d'absence...",
    deductFrom:"À déduire de", myVacation:"Mes jours de vacances", myHours:"Mes heures",
    otherBelow:"Autre (préciser ci-dessous)", precisez:"Précisez", deductAutrePh:"Ex: récupération, sans solde...",
    comment:"Commentaire (optionnel)", commentPh:"Informations complémentaires...",
    submit:"Envoyer ma demande", sentTitle:"Demande envoyée !",
    sentMsg:"Votre demande de congé a bien été enregistrée et transmise pour validation.",
    alsoEmail:"📧 Envoyer aussi par email", newRequest:"Nouvelle demande", pickDate:"Choisir une date", close:"Fermer", dows:["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"],
    months:["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"],
    mailSubject:"Demande de congé", recapDu:"Du", recapAu:"au", recapType:"Type", recapDeduct:"À déduire de", recapComment:"Commentaire",
    mailHello:"Bonjour,", mailIntro:"Je souhaite poser une demande de congé :", mailName:"Nom et prénom",
    mailFrom:"Du", mailTo:"Au", mailType:"Type d'absence", mailDeduct:"À déduire de", mailComment:"Commentaire",
    mailThanks:"Merci de votre validation.", mailRegards:"Cordialement,",
    alertName:"Merci d'indiquer votre prénom et nom", alertDates:"Merci de sélectionner les dates",
    alertOrder:"La date de fin doit être après le début"
  },
  de:{
    title:"Urlaubsantrag", subtitle:"Mitarbeiterformular",
    infobox:"Füllen Sie dieses Formular aus, um Ihren Urlaubsantrag einzureichen. Er wird zur Genehmigung weitergeleitet.",
    nom:"Name", prenom:"Vorname", from:"Von", to:"Bis",
    absType:"Art der Abwesenheit", vacances:"Ferien", autre:"Andere (angeben)",
    precisezType:"Art angeben", absTypePh:"Art der Abwesenheit...",
    deductFrom:"Abzuziehen von", myVacation:"Meinen Ferientagen", myHours:"Meinen Stunden",
    otherBelow:"Andere (unten angeben)", precisez:"Angeben", deductAutrePh:"Z.B. Kompensation, unbezahlt...",
    comment:"Bemerkung (optional)", commentPh:"Zusätzliche Informationen...",
    submit:"Antrag senden", sentTitle:"Antrag gesendet !",
    sentMsg:"Ihr Urlaubsantrag wurde gespeichert und zur Genehmigung weitergeleitet.",
    alsoEmail:"📧 Auch per E-Mail senden", newRequest:"Neuer Antrag", pickDate:"Datum wählen", close:"Schliessen", dows:["Mo","Di","Mi","Do","Fr","Sa","So"],
    months:["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"],
    mailSubject:"Urlaubsantrag", recapDu:"Von", recapAu:"bis", recapType:"Art", recapDeduct:"Abzuziehen von", recapComment:"Bemerkung",
    mailHello:"Guten Tag,", mailIntro:"Ich möchte einen Urlaubsantrag stellen:", mailName:"Name und Vorname",
    mailFrom:"Von", mailTo:"Bis", mailType:"Art der Abwesenheit", mailDeduct:"Abzuziehen von", mailComment:"Bemerkung",
    mailThanks:"Vielen Dank für Ihre Genehmigung.", mailRegards:"Freundliche Grüsse,",
    alertName:"Bitte geben Sie Ihren Namen und Vornamen an", alertDates:"Bitte wählen Sie die Daten",
    alertOrder:"Das Enddatum muss nach dem Anfangsdatum liegen"
  }
};
function t(k){return I18N[LANG][k]!==undefined?I18N[LANG][k]:k;}
function setLang(l){
  LANG=l;
  document.getElementById("lang-fr").classList.toggle("active",l==="fr");
  document.getElementById("lang-de").classList.toggle("active",l==="de");
  document.documentElement.lang=l;
  document.querySelectorAll("[data-i18n]").forEach(el=>{el.textContent=t(el.getAttribute("data-i18n"));});
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{el.placeholder=t(el.getAttribute("data-i18n-ph"));});
}

let deductChoice="Vacances";

function syncDates(){
  const f=document.getElementById("date-from").value;
  const t=document.getElementById("date-to");
  if(f && (!t.value || t.value<f)) t.value=f;
}
function onTypeChange(){
  const v=document.getElementById("type-absence").value;
  document.getElementById("type-autre-fg").classList.toggle("hidden",v!=="__autre__");
}
function selectDeduct(el,val){
  document.querySelectorAll(".radio-opt").forEach(o=>o.classList.remove("selected"));
  el.classList.add("selected");
  el.querySelector("input").checked=true;
  deductChoice=val;
  document.getElementById("deduct-autre-fg").classList.toggle("hidden",val!=="Autre");
}

function fmtDate(s){
  if(!s)return"";
  const [y,m,d]=s.split("-");
  return `${parseInt(d)} ${I18N[LANG].months[parseInt(m)-1]} ${y}`;
}

function submitDemande(){
  const prenom=document.getElementById("prenom").value.trim();
  const nom=document.getElementById("nom").value.trim();
  const from=document.getElementById("date-from").value;
  const to=document.getElementById("date-to").value;
  let type=document.getElementById("type-absence").value;
  if(type==="__autre__") type=document.getElementById("type-autre").value.trim()||"Autre";
  let deduct=deductChoice;
  if(deduct==="Autre") deduct=document.getElementById("deduct-autre").value.trim()||"Autre";
  const comment=document.getElementById("commentaire").value.trim();

  if(!prenom||!nom){alert(t("alertName"));return;}
  if(!from||!to){alert(t("alertDates"));return;}
  if(from>to){alert(t("alertOrder"));return;}

  const demande={prenom,nom,from,to,type,deduct,comment,date:new Date().toISOString()};

  // Save to localStorage (so admin can import)
  let demandes=[];
  try{demandes=JSON.parse(localStorage.getItem("kosch_demandes_conges")||"[]");}catch(e){}
  demandes.push(demande);
  localStorage.setItem("kosch_demandes_conges",JSON.stringify(demandes));

  // Build recap
  document.getElementById("recap").innerHTML=`
    <b>${nom} ${prenom}</b><br>
    ${t("recapDu")} <b>${fmtDate(from)}</b> ${t("recapAu")} <b>${fmtDate(to)}</b><br>
    ${t("recapType")} : <b>${type}</b><br>
    ${t("recapDeduct")} : <b>${deduct}</b>
    ${comment?`<br>${t("recapComment")} : ${comment}`:""}
  `;

  // Build mailto link
  const subject=encodeURIComponent(`${t("mailSubject")} — ${nom} ${prenom}`);
  const body=encodeURIComponent(
    `${t("mailHello")}\n\n${t("mailIntro")}\n\n`+
    `${t("mailName")} : ${nom} ${prenom}\n`+
    `${t("mailFrom")} : ${fmtDate(from)}\n`+
    `${t("mailTo")} : ${fmtDate(to)}\n`+
    `${t("mailType")} : ${type}\n`+
    `${t("mailDeduct")} : ${deduct}\n`+
    (comment?`${t("mailComment")} : ${comment}\n`:"")+
    `\n${t("mailThanks")}\n${t("mailRegards")}\n${nom} ${prenom}`
  );
  document.getElementById("mail-link").href=`mailto:${EMAIL_DIRECTION}?subject=${subject}&body=${body}`;

  document.getElementById("form-card").classList.add("hidden");
  document.getElementById("success-card").classList.remove("hidden");
  window.scrollTo(0,0);
}

function resetForm(){
  document.getElementById("prenom").value="";
  document.getElementById("nom").value="";
  document.getElementById("date-from").value="";
  document.getElementById("date-to").value="";
  ["from","to"].forEach(w=>{const e=document.getElementById("disp-"+w);if(e){e.textContent=t("pickDate");e.classList.add("date-ph");}const fld=document.getElementById("field-"+w);if(fld)fld.classList.remove("filled");});
  document.getElementById("type-absence").value="Vacances";
  document.getElementById("type-autre").value="";
  document.getElementById("commentaire").value="";
  document.getElementById("deduct-autre").value="";
  document.getElementById("type-autre-fg").classList.add("hidden");
  document.getElementById("deduct-autre-fg").classList.add("hidden");
  document.querySelectorAll(".radio-opt").forEach((o,i)=>o.classList.toggle("selected",i===0));
  document.querySelector(".radio-opt input").checked=true;
  deductChoice="Vacances";
  document.getElementById("success-card").classList.add("hidden");
  document.getElementById("form-card").classList.remove("hidden");
  window.scrollTo(0,0);
}

// ===== CALENDRIER INTÉGRÉ (sélection en un tap) =====
let calTarget="from"; // which field we're picking
let calView=new Date(); calView.setDate(1);
function pad2(n){return String(n).padStart(2,"0");}
function isoOf(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function frOf(iso){if(!iso)return"";const[y,m,d]=iso.split("-");return `${parseInt(d)} ${I18N[LANG].months[parseInt(m)-1]} ${y}`;}
function openCal(which){
  calTarget=which;
  const cur=document.getElementById("date-"+which).value;
  if(cur){const[y,m]=cur.split("-").map(Number);calView=new Date(y,m-1,1);}
  else{calView=new Date();calView.setDate(1);}
  renderCal();
  document.getElementById("cal-overlay").classList.add("open");
}
function closeCal(){document.getElementById("cal-overlay").classList.remove("open");}
function calMove(step){calView.setMonth(calView.getMonth()+step);renderCal();}
function renderCal(){
  const dows=I18N[LANG].dows, months=I18N[LANG].months;
  document.getElementById("cal-title").textContent=months[calView.getMonth()]+" "+calView.getFullYear();
  document.getElementById("cal-dows").innerHTML=dows.map(d=>`<span>${d}</span>`).join("");
  const y=calView.getFullYear(), m=calView.getMonth();
  const first=new Date(y,m,1);
  let startDow=first.getDay(); startDow=(startDow===0?6:startDow-1); // Monday-first
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayIso=isoOf(new Date());
  const selFrom=document.getElementById("date-from").value;
  const selTo=document.getElementById("date-to").value;
  // Minimum for "to" = the "from" date
  const minIso=(calTarget==="to" && selFrom)?selFrom:null;
  let cells="";
  for(let i=0;i<startDow;i++)cells+=`<button type="button" class="cal-cell empty"></button>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${y}-${pad2(m+1)}-${pad2(d)}`;
    let cls="cal-cell";
    if(iso===todayIso)cls+=" today";
    if((calTarget==="from"&&iso===selFrom)||(calTarget==="to"&&iso===selTo))cls+=" selected";
    if(minIso&&iso<minIso)cls+=" disabled";
    cells+=`<button type="button" class="${cls}" onclick="pickDay('${iso}')">${d}</button>`;
  }
  document.getElementById("cal-grid").innerHTML=cells;
}
function pickDay(iso){
  document.getElementById("date-"+calTarget).value=iso;
  const disp=document.getElementById("disp-"+calTarget);
  disp.textContent=frOf(iso);
  disp.classList.remove("date-ph");
  document.getElementById("field-"+calTarget).classList.add("filled");
  // If picking "from" and "to" is empty or before "from", set "to" = "from"
  if(calTarget==="from"){
    const toV=document.getElementById("date-to");
    if(!toV.value||toV.value<iso){
      toV.value=iso;
      const dispTo=document.getElementById("disp-to");
      dispTo.textContent=frOf(iso);dispTo.classList.remove("date-ph");
      document.getElementById("field-to").classList.add("filled");
    }
  }
  closeCal();
}
// Re-render field labels on language change
const _setLangCal=setLang;
setLang=function(l){
  _setLangCal(l);
  const f=document.getElementById("date-from").value, t=document.getElementById("date-to").value;
  if(f){const e=document.getElementById("disp-from");e.textContent=frOf(f);e.classList.remove("date-ph");}
  if(t){const e=document.getElementById("disp-to");e.textContent=frOf(t);e.classList.remove("date-ph");}
};

</script>

</body></html>
